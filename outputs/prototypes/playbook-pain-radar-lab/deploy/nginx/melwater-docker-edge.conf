# Edge vhost for the shared ai_video_nginx container.
# Requires melwater_web and melwater_api to join lighthouse_ai_video_net.

server {
    listen 443 ssl;
    http2 on;
    server_name melwater.lute-tlz-dddd.top;

    ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 2m;

    location /api/review-state {
        proxy_pass http://melwater_api:4174;
        include /etc/nginx/proxy_params.conf;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://melwater_web;
        include /etc/nginx/proxy_params.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }
}
